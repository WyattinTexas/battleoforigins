<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle of Origins — Phaser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; }
  #game-container { width: 100vw; height: 100vh; position: relative; }

  /* ── DOM HUD OVERLAY — always anchored to screen edges ── */
  #hud-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; font-family: monospace; }
  #hud-overlay * { pointer-events: auto; }
  #hud-top { position: absolute; top: 6px; left: 8px; }
  #hud-top-right { position: absolute; top: 6px; right: 8px; }
  #hud-action-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
  .action-btn { width: 52px; height: 52px; background: #1a1a2eee; border: 2px solid #44bbff; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .action-btn:hover { background: #333366; border-color: #ffffff; }
  .action-btn .icon { font-size: 20px; line-height: 1; }
  .action-btn .label { font-size: 8px; font-weight: bold; margin-top: 2px; }
  .action-btn .status { font-size: 7px; color: #888; }
  #hud-chat { position: absolute; bottom: 70px; left: 8px; width: 260px; max-height: 120px; background: #0a0a1acc; border: 1px solid #334466; border-radius: 4px; padding: 4px 6px; font-size: 10px; color: #aabbcc; overflow-y: auto; }
  #hud-chat .chat-header { color: #88aacc; font-weight: bold; margin-bottom: 2px; }
  #hud-chat .chat-input { color: #556677; margin-top: 4px; }
  #hud-minimap { position: absolute; bottom: 70px; right: 8px; width: 90px; height: 65px; background: #000000aa; border: 1px solid #444466; }
  .hud-info { background: #000000aa; color: #fff; padding: 2px 6px; font-size: 11px; display: inline-block; margin-bottom: 2px; }
  .hud-team { background: #000000aa; color: #88ff88; padding: 2px 6px; font-size: 10px; display: inline-block; }
</style>
</head>
<body>
<div id="game-container">
  <!-- DOM HUD — always anchored to actual screen edges -->
  <div id="hud-overlay">
    <div id="hud-top">
      <div id="hud-player-info" class="hud-info"></div><br>
      <div id="hud-team-info" class="hud-team"></div>
    </div>
    <div id="hud-top-right">
      <div id="hud-time" class="hud-info" style="color:#aac;font-size:10px;"></div>
    </div>
    <div id="hud-chat">
      <div class="chat-header">Chat</div>
      <div id="hud-chat-messages">Welcome to Battle of Origins!</div>
      <div class="chat-input" id="hud-chat-input">Press Enter to chat...</div>
    </div>
    <div id="hud-action-bar"></div>
    <div id="hud-minimap"><canvas id="minimap-canvas" width="90" height="65"></canvas></div>
  </div>
</div>

<!-- Firebase SDK (Realtime Database) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDzYoQqXoOu4uj2wzTwSn6d_gAlo6e8WSI",
    databaseURL: "https://testroom-75200-default-rtdb.firebaseio.com",
    projectId: "testroom-75200",
  });
  var db = firebase.database();
  db._stub = false;
</script>

<!-- Phaser Engine (CDN — no install needed) -->
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>

<!-- Global State & Stubs (must load before core modules) -->
<script src="src/main.js?v=73"></script>
<script src="src/globals.js?v=73"></script>

<!-- World generation (full map from 2D version) -->
<script src="src/world-gen.js?v=73"></script>

<!-- Block 2D-era setInterval/requestAnimationFrame during module load -->
<script>
  window._realSetInterval = window.setInterval;
  window._realRAF = window.requestAnimationFrame;
  window.setInterval = function(fn, ms) { return 0; };
  window.requestAnimationFrame = function(fn) { return 0; };
</script>

<!-- Core Game Logic (ported from 2D version — pure JS, no DOM) -->
<script src="src/core/cards-data.js?v=73"></script>
<!-- New battle engine (testroom2 port) -->
<script src="src/core/dice-engine.js?v=73"></script>
<script src="src/core/willpower.js?v=73"></script>
<script src="src/core/resources.js?v=73"></script>
<script src="src/core/card-abilities.js?v=73"></script>
<script src="src/core/battle-engine.js?v=73"></script>
<!-- Legacy battle (kept for backwards compat during transition) -->
<script src="src/core/battle.js?v=73"></script>
<script src="src/core/npcs.js?v=73"></script>
<script src="src/core/crafting.js?v=73"></script>
<script src="src/core/gathering.js?v=73"></script>
<script src="src/core/quests.js?v=73"></script>
<script src="src/core/professions.js?v=73"></script>
<script src="src/core/talent-data.js?v=73"></script>
<script src="src/core/fortune.js?v=73"></script>
<script src="src/core/buffs.js?v=73"></script>
<script src="src/core/structures.js?v=73"></script>
<script src="src/core/custom-events.js?v=73"></script>
<script src="src/core/market.js?v=73"></script>
<script src="src/core/world-events.js?v=73"></script>
<script src="src/core/housing.js?v=73"></script>
<script src="src/core/achievements.js?v=73"></script>

<!-- Restore after modules loaded — Phaser needs these -->
<script>
  window.setInterval = window._realSetInterval;
  window.requestAnimationFrame = window._realRAF;
</script>

<!-- Panel Manager (reusable overlay system) -->
<script src="src/PanelManager.js?v=73"></script>

<!-- Phaser Scenes (rendering layer) -->
<script src="src/scenes/CommScene.js?v=73"></script>
<script src="src/scenes/BootScene.js?v=73"></script>
<script src="src/scenes/WorldScene.js?v=73"></script>
<script src="src/scenes/CraftScene.js?v=73"></script>
<script src="src/scenes/TalentScene.js?v=73"></script>
<script src="src/scenes/BuildingScene.js?v=73"></script>
<script src="src/scenes/BattleScene.js?v=73"></script>

<!-- Initialize -->
<script>
  // Generate world map
  generateWorld();
  // Ensure player defaults after all scripts loaded
  ensurePlayerDefaults();
  // Try to load saved game
  loadGame();
  ensurePlayerDefaults();
  if (typeof ensureFortuneDefaults === 'function') ensureFortuneDefaults();
  if (typeof ensureBuffDefaults === 'function') ensureBuffDefaults();
  if (typeof ensureStructureDefaults === 'function') ensureStructureDefaults();
  // Add scenes to config (they're defined by now)
  config.scene = [BootScene, WorldScene, BattleScene, CraftScene, TalentScene, BuildingScene];
  // Start Phaser
  const game = new Phaser.Game(config);
</script>
</body>
</html>

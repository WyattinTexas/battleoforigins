<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle of Origins — Phaser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; }
  #game-container { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="game-container"></div>

<!-- Firebase SDK (Realtime Database) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyDzYoQqXoOu4uj2wzTwSn6d_gAlo6e8WSI",
    databaseURL: "https://testroom-75200-default-rtdb.firebaseio.com",
    projectId: "testroom-75200",
  });
  var db = firebase.database();
  db._stub = false;
</script>

<!-- Phaser Engine (CDN — no install needed) -->
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>

<!-- Global State & Stubs (must load before core modules) -->
<script src="src/main.js?v=68"></script>
<script src="src/globals.js?v=68"></script>

<!-- World generation (full map from 2D version) -->
<script src="src/world-gen.js?v=68"></script>

<!-- Block 2D-era setInterval/requestAnimationFrame during module load -->
<script>
  window._realSetInterval = window.setInterval;
  window._realRAF = window.requestAnimationFrame;
  window.setInterval = function(fn, ms) { return 0; };
  window.requestAnimationFrame = function(fn) { return 0; };
</script>

<!-- Core Game Logic (ported from 2D version — pure JS, no DOM) -->
<script src="src/core/cards-data.js?v=68"></script>
<script src="src/core/battle.js?v=68"></script>
<script src="src/core/npcs.js?v=68"></script>
<script src="src/core/crafting.js?v=68"></script>
<script src="src/core/gathering.js?v=68"></script>
<script src="src/core/quests.js?v=68"></script>
<script src="src/core/professions.js?v=68"></script>
<script src="src/core/talent-data.js?v=68"></script>
<script src="src/core/fortune.js?v=68"></script>
<script src="src/core/buffs.js?v=68"></script>
<script src="src/core/structures.js?v=68"></script>
<script src="src/core/custom-events.js?v=68"></script>
<script src="src/core/market.js?v=68"></script>
<script src="src/core/world-events.js?v=68"></script>
<script src="src/core/housing.js?v=68"></script>
<script src="src/core/achievements.js?v=68"></script>

<!-- Restore after modules loaded — Phaser needs these -->
<script>
  window.setInterval = window._realSetInterval;
  window.requestAnimationFrame = window._realRAF;
</script>

<!-- Panel Manager (reusable overlay system) -->
<script src="src/PanelManager.js?v=68"></script>

<!-- Phaser Scenes (rendering layer) -->
<script src="src/scenes/CommScene.js?v=68"></script>
<script src="src/scenes/BootScene.js?v=68"></script>
<script src="src/scenes/WorldScene.js?v=68"></script>
<script src="src/scenes/CraftScene.js?v=68"></script>
<script src="src/scenes/TalentScene.js?v=68"></script>
<script src="src/scenes/BuildingScene.js?v=68"></script>
<script src="src/scenes/BattleScene.js?v=68"></script>

<!-- Initialize -->
<script>
  // Generate world map
  generateWorld();
  // Ensure player defaults after all scripts loaded
  ensurePlayerDefaults();
  // Try to load saved game
  loadGame();
  ensurePlayerDefaults();
  if (typeof ensureFortuneDefaults === 'function') ensureFortuneDefaults();
  if (typeof ensureBuffDefaults === 'function') ensureBuffDefaults();
  if (typeof ensureStructureDefaults === 'function') ensureStructureDefaults();
  // Add scenes to config (they're defined by now)
  config.scene = [BootScene, WorldScene, BattleScene, CraftScene, TalentScene, BuildingScene];
  // Start Phaser
  const game = new Phaser.Game(config);
</script>
</body>
</html>

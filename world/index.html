<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<title>Boo! Battle of Origins</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; }
  #game-container { width: 100vw; height: 100vh; position: relative; }

  /* ── DOM HUD OVERLAY — always anchored to screen edges ── */
  #hud-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 10; font-family: monospace; }
  #hud-overlay * { pointer-events: auto; }
  #hud-top { position: absolute; top: 6px; left: 8px; }
  #hud-top-right { position: absolute; top: 6px; right: 8px; }
  #hud-action-bar { position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
  .action-btn { width: 52px; height: 52px; background: #1a1a2eee; border: 2px solid #44bbff; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: all 0.15s; }
  .action-btn:hover { background: #333366; border-color: #ffffff; }
  .action-btn .icon { font-size: 20px; line-height: 1; }
  .action-btn .label { font-size: 8px; font-weight: bold; margin-top: 2px; }
  .action-btn .status { font-size: 7px; color: #888; }
  #hud-chat { position: absolute; bottom: 70px; left: 8px; width: 260px; max-height: 120px; background: #0a0a1acc; border: 1px solid #334466; border-radius: 4px; padding: 4px 6px; font-size: 10px; color: #aabbcc; overflow-y: auto; }
  #hud-chat .chat-header { color: #88aacc; font-weight: bold; margin-bottom: 2px; }
  #hud-chat .chat-input { color: #556677; margin-top: 4px; }
  #hud-minimap { position: absolute; bottom: 70px; right: 8px; width: 90px; height: 65px; background: #000000aa; border: 1px solid #444466; }
  .hud-info { background: #000000aa; color: #fff; padding: 2px 6px; font-size: 11px; display: inline-block; margin-bottom: 2px; }
  .hud-team { background: #000000aa; color: #88ff88; padding: 2px 6px; font-size: 10px; display: inline-block; }

  /* ── Quest Tracker (post-tutorial breadcrumbs) ── */
  #quest-tracker {
    position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
    z-index: 15; pointer-events: none;
    background: #0a0a1acc; border: 1.5px solid #d4a040; border-radius: 6px;
    padding: 6px 16px; font-family: Cinzel, Georgia, serif;
    font-size: 12px; color: #e8d5a0; letter-spacing: 0.5px;
    text-align: center; white-space: nowrap;
    opacity: 0; display: none; transition: opacity 0.5s ease;
  }
  #quest-tracker.visible { display: block; opacity: 1; }
  #quest-tracker.pulse {
    animation: quest-pulse 0.8s ease-in-out 2;
  }
  @keyframes quest-pulse {
    0%, 100% { border-color: #d4a040; box-shadow: 0 0 4px #d4a04044; }
    50% { border-color: #ffcc55; box-shadow: 0 0 12px #d4a04088; }
  }
</style>
</head>
<body>
<div id="game-container">
  <!-- DOM HUD — always anchored to actual screen edges -->
  <div id="hud-overlay">
    <div id="quest-tracker"></div>
    <div id="hud-top">
      <div id="hud-player-info" class="hud-info"></div><br>
      <div id="hud-team-info" class="hud-team"></div>
    </div>
    <div id="hud-top-right" style="display:flex; flex-direction:column; align-items:flex-end; gap:4px;">
      <div id="hud-time" class="hud-info" style="color:#aac;font-size:10px;"></div>
      <div id="hud-guide-btn" style="
        background:#1a1a2eee; border:1.5px solid #d4a040; border-radius:6px;
        padding:5px 12px; cursor:pointer; font-family:Cinzel,Georgia,serif;
        font-size:11px; color:#d4a040; font-weight:bold; letter-spacing:1px;
        transition:all 0.15s; user-select:none;
      " onmouseover="this.style.background='#2a2a40';this.style.color='#ffcc55'" onmouseout="this.style.background='#1a1a2eee';this.style.color='#d4a040'">
        📖 GUIDE
      </div>
    </div>
    <div id="hud-chat">
      <div class="chat-header">Chat</div>
      <div id="hud-chat-messages">Welcome to Battle of Origins!</div>
      <input type="text" id="hud-chat-input" placeholder="Press Enter to chat..." maxlength="120"
        style="background:transparent;border:1px solid #334466;color:#aabbcc;font-size:10px;font-family:monospace;width:100%;padding:3px 6px;outline:none;box-sizing:border-box;"
        autocomplete="off">
    </div>
    <div id="hud-action-bar"></div>
    <div id="hud-minimap" style="display:none;"><canvas id="minimap-canvas" width="90" height="65"></canvas></div>
  </div>
</div>

<!-- Initialize -->
<script>
  // Generate world map
  generateWorld();
  // Ensure player defaults after all scripts loaded
  ensurePlayerDefaults();
  // Try to load saved game
  loadGame();
  ensurePlayerDefaults();
  if (typeof ensureFortuneDefaults === 'function') ensureFortuneDefaults();
  if (typeof ensureBuffDefaults === 'function') ensureBuffDefaults();
  if (typeof ensureStructureDefaults === 'function') ensureStructureDefaults();
  // Add scenes to config (they're defined by now)
  config.scene = [BootScene, WorldScene, BattleScene, CraftScene, TalentScene, BuildingScene, DungeonScene];
  // Start Phaser
  const game = new Phaser.Game(config);

  // Wire DOM chat input to GameChat
  const chatInput = document.getElementById('hud-chat-input');
  if (chatInput) {
    chatInput.addEventListener('keydown', function(e) {
      e.stopPropagation(); // prevent Phaser from capturing keys while typing
      if (e.key === 'Enter') {
        const msg = chatInput.value.trim();
        if (msg && typeof GameChat !== 'undefined') {
          GameChat.send(msg);
        }
        chatInput.value = '';
        chatInput.blur();
      } else if (e.key === 'Escape') {
        chatInput.value = '';
        chatInput.blur();
      }
    });
    // Focus chat on click
    chatInput.addEventListener('focus', function() {
      if (typeof G !== 'undefined') G._chatFocused = true;
    });
    chatInput.addEventListener('blur', function() {
      if (typeof G !== 'undefined') G._chatFocused = false;
    });
  }
</script>

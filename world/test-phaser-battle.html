<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Phaser Battle Integration Test</title>
<style>
  body { margin: 0; background: #0a0a14; }
  #game-container { width: 100vw; height: 80vh; position: relative; }
  #test-log { position: fixed; bottom: 0; left: 0; right: 0; height: 20vh; background: #111; color: #f0e8d4;
    font-family: monospace; font-size: 11px; overflow-y: auto; padding: 8px; z-index: 9999; }
  .pass { color: #4ade80; } .fail { color: #ff4444; } .info { color: #4cc9f0; }
</style>
</head>
<body>
<div id="game-container"></div>
<div id="test-log"></div>

<!-- Stubs for systems we don't need -->
<div id="hud-overlay" style="display:none"></div>
<div id="hud-chat"><div id="hud-chat-messages"></div><input id="hud-chat-input"></div>
<canvas id="minimap-canvas" width="90" height="65" style="display:none"></canvas>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@4.1.0/dist/phaser.min.js"></script>
<script src="src/main.js"></script>
<script src="src/globals.js"></script>
<script src="src/core/cards-data.js"></script>
<script src="src/core/dice-engine.js"></script>
<script src="src/core/willpower.js"></script>
<script src="src/core/resources.js"></script>
<script src="src/core/card-abilities.js"></script>
<script src="src/core/battle-engine.js"></script>
<script src="src/core/battle.js"></script>
<script src="src/core/roll-announcer.js"></script>
<script src="src/core/battle-dice-3d.js"></script>
<script src="src/scenes/BattleScene.js"></script>

<script>
const log = document.getElementById('test-log');
function tlog(msg, cls) { log.innerHTML += `<span class="${cls||'info'}">${msg}</span><br>`; log.scrollTop = log.scrollHeight; }
function tpass(msg) { tlog('✓ ' + msg, 'pass'); }
function tfail(msg) { tlog('✗ ' + msg, 'fail'); }

// Setup game state
ensurePlayerDefaults();
G.name = 'TestBot';
G.team = [
  { id: 108, name: 'Lucy', hp: 8, maxHp: 8, ko: false },      // Win: gain Sacred Fire
  { id: 56, name: 'Chad', hp: 6, maxHp: 6, ko: false },        // Entry: gain 2 Ice
  { id: 34, name: 'Grawr', hp: 7, maxHp: 7, ko: false },       // Entry: deal 1 dmg
];
G.activeIdx = 0;

// Init battle with known opponents
initBattle([108, 56, 34], [59, 60, 112], { type: 'test' });
G.inBattle = true;

// Give player some resources to test clicking
B.red.resources.ice = 2;
B.red.resources.fire = 1;
B.red.resources.surge = 1;
B.red.resources.healingSeed = 1;

// Set up willpower hand with Spark on top (easy to verify)
B.red.ghosts[0].willpower = [2, 1, 9, 5, 0, 0, 0, 0]; // Spark, Bonanza, Shell, Moonstone, Hearts
B.red.ghosts[0].hp = 8;

tlog('Battle initialized: Lucy vs Shade + Doom + Floop');
tlog('Resources: ice=2, fire=1, surge=1, seed=1');
tlog('Top willpower: Spark (should gain +1 Surge)');

// Create test scene that wraps BattleScene
class TestBattleScene extends BattleScene {
  create() {
    super.create();

    // After scene builds, run automated tests with delays
    this.time.delayedCall(2000, () => this.runTests());
  }

  async runTests() {
    tlog('\n=== RUNNING AUTOMATED UI TESTS ===', 'info');

    // Test 1: Check willpower area rendered
    if (this._pWPArea) tpass('Willpower area rendered');
    else tfail('Willpower area not found');

    // Test 2: Check buttons rendered
    if (this._redBtn) tpass('RED ROLL button rendered');
    else tfail('RED ROLL button missing');

    // Test 3: Check active cards rendered
    if (this._pActive) tpass('Player active card rendered');
    else tfail('Player active card missing');
    if (this._eActive) tpass('Enemy active card rendered');
    else tfail('Enemy active card missing');

    // Test 4: Check sideline rendered
    if (this._pSideline) tpass('Player sideline rendered');
    else tfail('Player sideline missing');

    // Test 5: Status bar
    if (this._statusBar && this._statusBar.text) tpass('Status bar: "' + this._statusBar.text + '"');
    else tfail('Status bar missing');

    // Test 6: Try activating willpower programmatically
    tlog('\n--- Willpower Activation Test ---', 'info');
    const surgeBefore = B.red.resources.surge;
    this._activateWillpower();
    this.time.delayedCall(500, () => {
      if (B.red.resources.surge > surgeBefore) tpass(`Spark activated! Surge: ${surgeBefore} → ${B.red.resources.surge}`);
      else tfail(`Spark failed. Surge still ${B.red.resources.surge}`);

      // Test 7: Try committing ice shard programmatically
      tlog('\n--- Resource Commit Test ---', 'info');
      const iceBefore = B.red.resources.ice;
      if (typeof cycleCommit === 'function') {
        const result = cycleCommit('red', 'ice');
        if (result >= 1) tpass(`Ice committed! ice: ${iceBefore} → ${B.red.resources.ice}, committed: ${result}`);
        else tfail(`Ice commit failed: ${result}`);
      }

      // Rebuild WP to show updated resources
      this._rebuildWP();

      // Test 8: Do a combat round
      tlog('\n--- Combat Round Test ---', 'info');
      this.time.delayedCall(1000, () => {
        this.doRound();
        this.time.delayedCall(3000, () => {
          tlog(`Round result: Red HP=${activeGhost(B.red)?.hp}, Blue HP=${activeGhost(B.blue)?.hp}`, 'info');
          tlog(`Resources after round: fire=${B.red.resources.fire} ice=${B.red.resources.ice} surge=${B.red.resources.surge}`, 'info');
          if (B.red.resources.fire > 0) tpass('Lucy generated Sacred Fire (win-path ability working!)');
          else tlog('Lucy did not gain Sacred Fire this round (may have lost)', 'info');

          tlog('\n=== UI TESTS COMPLETE ===', 'info');
          // Signal to puppeteer that tests are done
          window._testsComplete = true;
        });
      });
    });
  }
}

// Override scene list with just our test scene
config.scene = [TestBattleScene];
config.parent = 'game-container';
const game = new Phaser.Game(config);
</script>
</body>
</html>
